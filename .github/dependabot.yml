# Keep SHA-pinned GitHub Actions current (Dependabot updates the pin and the
# trailing version comment together).
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
  - package-ecosystem: npm
    directory: /workers/native-installer-redirect
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
