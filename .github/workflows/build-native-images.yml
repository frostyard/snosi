          if-no-files-found: error

      - name: cleanup build output
        if: always()
        run: sudo -E .mkosi/bin/mkosi clean

  # ===========================================================================
  # test-public-origin: independently re-verify each product's candidate
  # objects against the REAL public URL (not the write path) before any
  # promotion is allowed to run. A single matrix job (fail-fast: false) so
  # legs run in parallel; each leg's own artifact download decides whether
  # its product actually has anything to verify, so one product's build
  # failure never blocks the others' verification.
  # ===========================================================================
  test-public-origin:
    needs: [build-cayo, build-snow, build-snowfield]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        product: [cayo, snow, snowfield]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Redirect /var/tmp to /mnt
        # verify-remote.sh hard-codes /var/tmp (see build-* jobs' own
        # comment on this); it downloads full candidate objects to verify
        # them byte-for-byte.
        run: |
          sudo mkdir -p /mnt/var-tmp
          sudo chmod 1777 /mnt/var-tmp
          sudo mount --bind /mnt/var-tmp /var/tmp

      - name: Download prepared publication metadata
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-prepared-${{ matrix.product }}
          path: /var/tmp/native-publish/${{ matrix.product }}/x86-64

      - name: Skip (build did not produce candidate objects for this product)
        if: steps.download.outcome != 'success'
        run: |
          echo "::notice::No native-prepared-${{ matrix.product }} artifact found -- build-${{ matrix.product }} did not complete successfully this run. Skipping public-origin verification for ${{ matrix.product }}."

      - name: Verify candidate objects against the public origin
        if: steps.download.outcome == 'success'
        id: verify
        run: |
          ./shared/native-ab/publish/verify-remote.sh \
            "/var/tmp/native-publish/${{ matrix.product }}/x86-64" \
            "https://repository.frostyard.org/os/native/v1/${{ matrix.product }}/x86-64"

      - name: Record verified marker
        if: steps.verify.outcome == 'success'
        run: |
          mkdir -p /var/tmp/native-verified
          echo "${{ matrix.product }} verified $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "/var/tmp/native-verified/${{ matrix.product }}"

      - name: Upload verified marker
        if: steps.verify.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-verified-${{ matrix.product }}
          path: /var/tmp/native-verified/${{ matrix.product }}
          retention-days: 3
          if-no-files-found: error

  # ===========================================================================
  # promote-cayo / promote-snow / promote-snowfield
  #
  # Each gated on the native-promotion protected environment, which holds
  # the OpenPGP update-signing private key as an environment secret. Runs
  # promote.sh. Independent jobs so one product's promotion failure never
  # blocks another's; each independently checks for its own product's
  # "verified" marker from test-public-origin and no-ops (not fails) if
  # that product never got that far this run.
  # ===========================================================================

  promote-cayo:
    needs: test-public-origin
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment: native-promotion
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Redirect /var/tmp to /mnt
        run: |
          sudo mkdir -p /mnt/var-tmp
          sudo chmod 1777 /mnt/var-tmp
          sudo mount --bind /mnt/var-tmp /var/tmp

      - name: Download verified marker
        id: marker
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-verified-cayo
          path: /var/tmp/native-verified

      - name: Download prepared publication metadata
        id: prepared
        if: steps.marker.outcome == 'success'
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-prepared-cayo
          path: /var/tmp/native-publish/cayo/x86-64

      - name: Skip (cayo did not pass public-origin verification this run)
        if: steps.marker.outcome != 'success' || steps.prepared.outcome != 'success'
        run: |
          echo "::notice::cayo has no verified candidate this run -- skipping promotion."

      - name: Install rclone
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        run: sudo apt-get install -y rclone

      - name: Write OpenPGP update-signing key
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        env:
          NATIVE_UPDATE_SIGNING_KEY: ${{ secrets.NATIVE_UPDATE_SIGNING_KEY }}
          NATIVE_UPDATE_SIGNING_PASSPHRASE: ${{ secrets.NATIVE_UPDATE_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          [[ -n "$NATIVE_UPDATE_SIGNING_KEY" ]] || { echo "::error::secrets.NATIVE_UPDATE_SIGNING_KEY is not set in the native-promotion environment -- see docs/native-ab-publication.md 'Production key ceremony'" >&2; exit 1; }
          umask 077
          mkdir -p /var/tmp/native-promote-secrets
          printf '%s' "$NATIVE_UPDATE_SIGNING_KEY" > /var/tmp/native-promote-secrets/os-update-signing.key
          chmod 600 /var/tmp/native-promote-secrets/os-update-signing.key
          # The production key is passphrase-protected; write the passphrase so
          # promote.sh can sign via gpg --pinentry-mode loopback. A passphrase-less
          # key simply leaves this secret unset (no file, no --passphrase-file).
          if [[ -n "${NATIVE_UPDATE_SIGNING_PASSPHRASE:-}" ]]; then
            printf '%s' "$NATIVE_UPDATE_SIGNING_PASSPHRASE" > /var/tmp/native-promote-secrets/passphrase
            chmod 600 /var/tmp/native-promote-secrets/passphrase
          fi

      - name: Promote cayo
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.NATIVE_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.NATIVE_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.NATIVE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_ACL: private
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          args=(--signing-key /var/tmp/native-promote-secrets/os-update-signing.key)
          [[ -f /var/tmp/native-promote-secrets/passphrase ]] && \
            args+=(--passphrase-file /var/tmp/native-promote-secrets/passphrase)
          # Purge the edge cache for the metadata pair after promotion, when a
          # Cloudflare token is configured. The no-store header + cache-bypass
          # rule are the primary protection; this is belt-and-suspenders, and is
          # simply skipped for staging/rehearsal runs without CF secrets.
          if [[ -n "${CF_ZONE_ID:-}" && -n "${CF_API_TOKEN:-}" ]]; then
            args+=(--purge-hook "$PWD/shared/native-ab/publish/cloudflare-purge.sh")
          fi
          ./shared/native-ab/publish/promote.sh "${args[@]}" \
            /var/tmp/native-publish/cayo/x86-64 \
            https://repository.frostyard.org/os/native/v1/cayo/x86-64 \
            "rclone:r2:${{ secrets.NATIVE_R2_BUCKET }}"

      - name: Verify cayo published index (served bytes, not just purge API 200)
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        run: |
          set -euo pipefail
          ver="$(jq -r .version /var/tmp/native-publish/cayo/x86-64/publication-info.json)"
          ./shared/native-ab/publish/verify-published-index.sh \
            --expect-version "$ver" \
            https://repository.frostyard.org/os/native/v1/cayo/x86-64

      - name: Remove OpenPGP update-signing key
        if: always()
        run: rm -rf /var/tmp/native-promote-secrets

      - name: Record promoted marker
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        run: |
          mkdir -p /var/tmp/native-promoted
          echo "cayo promoted $(date -u +%Y-%m-%dT%H:%M:%SZ)" > /var/tmp/native-promoted/cayo

      - name: Upload promoted marker
        if: steps.marker.outcome == 'success' && steps.prepared.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-promoted-cayo
          path: /var/tmp/native-promoted/cayo
          retention-days: 90
          if-no-files-found: error

