          openssl x509 -in .snosi-private/pcr-signing.crt -pubkey -noout > .snosi-private/pcr-signing.pub

      - name: Build image
        run: |
          sudo TMPDIR="$TMPDIR" .mkosi/bin/mkosi --profile "$PROFILE" \
