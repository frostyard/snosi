        run: |
          sudo TMPDIR="$TMPDIR" .mkosi/bin/mkosi --profile "$PROFILE" \
            --dependency= \
            --dependency=base \
            --image-version "$VERSION" \
            build

      - name: Remove Secure Boot/MOK and PCR signing key material
        if: always()
        run: |
