  # ---------------------------------------------------------------------
  # release-notes: non-blocking, human-facing summary of whichever
  # products actually promoted this run (plan "GitHub Releases").
  # ---------------------------------------------------------------------
  release-notes:
    needs: [prepare, promote-cayo, promote-snow, promote-snowfield]
    if: github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download promoted markers
        id: markers
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-promoted-*
          path: /var/tmp/native-promoted
          merge-multiple: true

      - name: Compose and publish release notes
        if: steps.markers.outcome == 'success'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          REVISION: ${{ needs.prepare.outputs.revision }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          promoted=()
          for product in cayo snow snowfield; do
            [[ -f "/var/tmp/native-promoted/$product" ]] && promoted+=("$product")
          done
          if [[ ${#promoted[@]} -eq 0 ]]; then
            echo "::notice::No native products were promoted this run; skipping release."
            exit 0
          fi
          {
            echo "Native A/B build $VERSION (source ${REVISION:0:12})"
            echo ""
            echo "Promoted products: ${promoted[*]}"
            echo ""
            for product in "${promoted[@]}"; do
              echo "## $product"
              echo "- Index: https://repository.frostyard.org/os/native/v1/$product/x86-64/SHA256SUMS"
              echo "- Signature: https://repository.frostyard.org/os/native/v1/$product/x86-64/SHA256SUMS.gpg"
            done
            echo ""
            echo "See docs/native-ab-publication.md for verification instructions and the update-key fingerprint."
          } > /var/tmp/native-release-notes.md
          gh release create "native-$VERSION" \
            --title "Native A/B $VERSION" \
            --notes-file /var/tmp/native-release-notes.md
