name: Build Native Images

# Native A/B (cayo-ab, snow-ab, snowfield-ab) build/publish pipeline
# (docs/plans/2026-07-14-bootc-native-ab-coexistence-plan.md "Native Build
# Workflow", docs/native-ab-publication.md, docs/native-ab-contracts.md).
#
# THIS WORKFLOW IS A THIN CALLER. Every real step below is a call into an
# in-repo, independently testable script (shared/native-ab/publish/*.sh,
# shared/native-ab/ci/*.sh, test/*.sh) -- the only logic that lives directly
# in this YAML is orchestration glue (job ordering, secret-file plumbing,
# disk-space mitigation) that has no meaningful existence outside a GitHub
# Actions runner. Any build/publish/verification LOGIC added here instead of
# to one of those scripts is a defect -- see docs/native-ab-publication.md's
# "CI publication flow" section for the full rationale.
#
# Trigger: builds run on every push and PR to main (mirroring build-images.yml
# exactly, same sysext paths-ignore -- sysext-only metadata changes rebuild
# via build.yml, not here), plus workflow_dispatch and repository_dispatch.
# PUBLICATION is gated separately from building: the promote-* jobs carry
# `github.event_name != 'pull_request'`, so a PR builds + verifies against the
# public origin but NEVER signs or mutates the live R2 index -- only main
# pushes (and manual dispatch) publish. The native-promotion GitHub
# environment additionally restricts to protected (main) branches, so a
# workflow_dispatch fired from a feature branch still cannot promote.
#
# Signing-key custody note: the build-* jobs receive the Secure Boot/MOK
# (SecureBootKey/SecureBootCertificate) and PCR signing
# (SignExpectedPcrKey/SignExpectedPcrCertificate) private key material as
# native-build environment secrets, written to runner-local files immediately
# before the one mkosi build step that consumes them, never echoed, removed by
# both an in-step trap and an `if: always()` cleanup. The approval gate on
# that environment was removed for velocity; the environment is now open to
# any branch, so same-repo PR branches build with these keys (fork PRs cannot
# access secrets and their build jobs fail, as expected). This is an accepted
# risk pending mkosi split final-assembly-from-signing support
# (docs/native-ab-contracts.md SS7); the promotion (OpenPGP update-signing)
# key stays main-branch-scoped via the native-promotion environment.
on:
  repository_dispatch:
    types:
      - build
  push:
    branches: [main]
    paths-ignore:
      # Sysext-only dependency metadata should rebuild/publish sysexts via
      # build.yml without spending the native image matrix.
      - "shared/download/package-versions.json"
      - "latest-versions.txt"
      - "shared/download/sysext-checksums.json"
  pull_request:
    branches: [main]
    paths-ignore:
      - "shared/download/package-versions.json"
      - "latest-versions.txt"
      - "shared/download/sysext-checksums.json"
  workflow_dispatch:

permissions: {}

# Serialize per-ref, never cancel a run that may be mid-promotion (two runs
# racing promote.sh against the same product's live SHA256SUMS/SHA256SUMS.gpg
# is the "old manifest + new detached signature disagree" window the plan
# warns about). PR builds -- which never promote -- may cancel a superseded
# run of the SAME PR to save runner time; push/dispatch runs never cancel.
concurrency:
  group: build-native-images-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # Cheap, no-network, no-build governance gate. Runs before any expensive
  # job starts (Mkosi Pin Governance: "CI must derive local and workflow
  # mkosi from the same commit and fail if they diverge").
  # ---------------------------------------------------------------------
  pin-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Assert mkosi pin matches build.yml
        run: ./shared/native-ab/ci/check-mkosi-pin.sh

  # ---------------------------------------------------------------------
  # Assign one version/revision shared by every product built in this run,
  # matching how build-images.yml versions its OCI builds -- co-published
  # native products share the same build timestamp.
  # ---------------------------------------------------------------------
  prepare:
    needs: pin-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      revision: ${{ steps.revision.outputs.revision }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate version
        # 14-digit UTC timestamp -- the frozen ^[0-9]{14}$ grammar
        # (docs/native-ab-contracts.md SS2), same shape as build-images.yml's
        # own version tag, so co-published products share one timestamp.
        id: version
        run: echo "version=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Record source revision
        id: revision
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # build-cayo / build-snow / build-snowfield
  #
  # Independent jobs (not a matrix) so each gets its own protected-
  # environment approval and one product's build failure never blocks
  # another's. Intentionally near-identical; the only per-product
  # differences are the profile/image-id names and snowfield's extra
  # Surface artifact check.
  # ===========================================================================

  build-cayo:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: native-build
    permissions:
      contents: read
    env:
      PROFILE: cayo-ab
      PRODUCT: cayo
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Show disk space (before)
        run: sudo df -h

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true

      - name: Redirect temp to /mnt
        # Mirrors build-images.yml's CI-disk-exhaustion mitigation: mkosi's
        # build workspace honors $TMPDIR. shared/native-ab/publish/*.sh
        # deliberately hard-code /var/tmp (never $TMPDIR, per this repo's
        # "/var/tmp not /tmp" convention), so bind-mount extra space over
        # /var/tmp too -- those scripts re-download full-size candidate
        # objects for independent verification later in this same job.
        run: |
          sudo mkdir -p /mnt/tmp /mnt/var-tmp
          sudo chmod 1777 /mnt/tmp /mnt/var-tmp
          sudo mount --bind /mnt/var-tmp /var/tmp
          echo "TMPDIR=/mnt/tmp" >> "$GITHUB_ENV"

      - name: Show disk space (after)
        run: sudo df -h

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Bootstrap pinned mkosi
        run: ./shared/native-ab/ci/bootstrap-mkosi.sh .mkosi

      - name: Assert mkosi pin matches build.yml
        run: ./shared/native-ab/ci/check-mkosi-pin.sh .mkosi

      - name: Prepare mkosi build host
        # Mirrors the host setup the systemd/mkosi action gives build.yml /
        # build-images.yml for free (minus KVM device setup -- these jobs
        # never boot VMs): the Debian archive keyring mkosi needs to verify
        # deb.debian.org, unprivileged user namespaces, removal of the
        # runner's broken apparmor profiles (apparmor/apparmor#402), and the
        # ca-certificates mountpoint.
        run: |
          sudo sysctl --ignore --write kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl --ignore --write kernel.apparmor_restrict_unprivileged_userns=0
          sudo aa-teardown || true
          sudo apt-get remove -y apparmor || true
          sudo mkdir -p /var/lib/ca-certificates
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends debian-archive-keyring \
            dracut-core binutils file python3-cryptography

      - name: Write Secure Boot/MOK and PCR signing key material
        # docs/native-ab-publication.md "Interim protected-builder
        # constraints": ephemeral, file-based, never echoed, removed
        # immediately after the one build step that needs them.
        env:
          NATIVE_SECURE_BOOT_KEY: ${{ secrets.NATIVE_SECURE_BOOT_KEY }}
          NATIVE_SECURE_BOOT_CERTIFICATE: ${{ secrets.NATIVE_SECURE_BOOT_CERTIFICATE }}
          NATIVE_PCR_SIGNING_KEY: ${{ secrets.NATIVE_PCR_SIGNING_KEY }}
          NATIVE_PCR_SIGNING_CERTIFICATE: ${{ secrets.NATIVE_PCR_SIGNING_CERTIFICATE }}
        run: |
          set -euo pipefail
          [[ -n "$NATIVE_SECURE_BOOT_KEY" ]] || { echo "::error::secrets.NATIVE_SECURE_BOOT_KEY is not set in the native-build environment" >&2; exit 1; }
          [[ -n "$NATIVE_SECURE_BOOT_CERTIFICATE" ]] || { echo "::error::secrets.NATIVE_SECURE_BOOT_CERTIFICATE is not set in the native-build environment" >&2; exit 1; }
          [[ -n "$NATIVE_PCR_SIGNING_KEY" ]] || { echo "::error::secrets.NATIVE_PCR_SIGNING_KEY is not set in the native-build environment" >&2; exit 1; }
          [[ -n "$NATIVE_PCR_SIGNING_CERTIFICATE" ]] || { echo "::error::secrets.NATIVE_PCR_SIGNING_CERTIFICATE is not set in the native-build environment" >&2; exit 1; }
          umask 077
          # .snosi-private/history is a SandboxTrees= source in shared/native-ab-secure/mkosi.conf
          # (PCR-key rotation history); mkosi refuses to build if it does not exist. It is
          # legitimately empty when no rotation is in progress.
          mkdir -p .snosi-private/history
          printf '%s' "$NATIVE_SECURE_BOOT_KEY" > mkosi.key
          printf '%s' "$NATIVE_SECURE_BOOT_CERTIFICATE" > mkosi.crt
          printf '%s' "$NATIVE_PCR_SIGNING_KEY" > .snosi-private/pcr-signing.key
          printf '%s' "$NATIVE_PCR_SIGNING_CERTIFICATE" > .snosi-private/pcr-signing.crt
          chmod 600 mkosi.key mkosi.crt .snosi-private/pcr-signing.key .snosi-private/pcr-signing.crt
          # Non-sensitive public key extracted for the artifact-test step
          # below; the private/cert files themselves are removed by the
          # cleanup step right after the build.
          openssl x509 -in .snosi-private/pcr-signing.crt -pubkey -noout > .snosi-private/pcr-signing.pub

      - name: Build image
        run: |
          # SNOSI_NATIVE_AUTOSTAGE=1 makes shared/outformat/ab-root/finalize ship
          # the snosi-sysupdate-stage.timer activation link, so installs from this
          # image auto-stage published updates (applied on next reboot; never a
          # forced reboot). Passed through sudo -- which otherwise strips the
          # environment -- so mkosi's `Environment=SNOSI_NATIVE_AUTOSTAGE` forward
          # reaches the finalize .chroot. Installer ISO build is unaffected (it
          # uses a literal --profile native-installer and no ab-root finalize).
          sudo SNOSI_NATIVE_AUTOSTAGE=1 TMPDIR="$TMPDIR" .mkosi/bin/mkosi --profile "$PROFILE" \
            --dependency= \
            --dependency=base \
            --image-version "$VERSION" \
            build

      - name: Remove Secure Boot/MOK and PCR signing key material
        if: always()
        run: |
          rm -f mkosi.key mkosi.crt .snosi-private/pcr-signing.key .snosi-private/pcr-signing.crt

      - name: Validate native A/B secure artifact contract
        run: |
          OUTPUT_NAME="$PROFILE" ./test/native-ab-secure-artifact-test.sh \
            "" "" "" .snosi-private/pcr-signing.pub single

      - name: Prepare native publication
        # shared/native-ab/publish/prepare-native-publication.sh derives
        # product/channel/version from the build's own manifest -- nothing
        # here is passed on the command line except the profile output name.
        # generate-sbom.sh is called internally.
        run: |
          ./shared/native-ab/publish/prepare-native-publication.sh --xz \
            output "$PROFILE" /var/tmp/native-publish

      - name: Publish candidate objects to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.NATIVE_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.NATIVE_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.NATIVE_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_ACL: private
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          sudo apt-get install -y rclone
          ./shared/native-ab/publish/publish-candidate.sh \
            "/var/tmp/native-publish/$PRODUCT/x86-64" \
            "rclone:r2:${{ secrets.NATIVE_R2_BUCKET }}"

      - name: Upload prepared publication metadata
        # Only the small pipeline records (publication-info.json,
        # SHA256SUMS) -- never the multi-gigabyte payload objects, which
        # already live in R2 after the step above. verify-remote.sh and
        # promote.sh only need these two files locally; they re-download
        # the actual candidate/final bytes over HTTP.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-prepared-cayo
          path: |
            /var/tmp/native-publish/cayo/x86-64/publication-info.json
            /var/tmp/native-publish/cayo/x86-64/SHA256SUMS
          retention-days: 3
          if-no-files-found: error

      - name: cleanup build output
        if: always()
        run: sudo -E .mkosi/bin/mkosi clean

  build-snow:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: native-build
    permissions:
      contents: read
    env:
      PROFILE: snow-ab
      PRODUCT: snow
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Show disk space (before)
        run: sudo df -h

      - name: Free Disk Space (Ubuntu)
