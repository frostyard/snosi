      - name: Upload prepared publication metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-prepared-snow
          path: |
            /var/tmp/native-publish/snow/x86-64/publication-info.json
            /var/tmp/native-publish/snow/x86-64/SHA256SUMS
