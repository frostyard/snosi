name: Test bootc installation

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (default: latest)'
        required: false
        default: 'latest'

permissions: {}

env:
  IMAGE: ghcr.io/frostyard/snow

jobs:
  test-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/lib/jvm /usr/share/dotnet /usr/share/swift \
            /usr/local/.ghcup /usr/local/lib/android /opt/microsoft \
            /opt/google /opt/az /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf podman skopeo

      # Everything that touches podman storage runs as root: bootc install
      # requires the root user namespace ("/proc/1 is owned by 65534" abort
      # under rootless podman), and the image must be pulled into root's
      # storage for the install container to see it.
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.6.1"

      - name: Verify image signature
        env:
          TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          # Resolve the mutable tag to its digest FIRST, then verify that
          # immutable ref and use it for everything downstream. Verifying the
          # tag and resolving afterwards leaves a window where the tag moves
          # to an unverified image.
          DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${IMAGE}:${TAG}")
          echo "Resolved ${IMAGE}:${TAG} -> ${DIGEST}"
          cosign verify --key cosign.pub "${IMAGE}@${DIGEST}"
          echo "IMAGE_REF=${IMAGE}@${DIGEST}" >> "$GITHUB_ENV"

      - name: Pull image
        run: |
          sudo podman pull "${IMAGE_REF}"

      - name: Run installation tests
        run: |
          sudo ./test/bootc-install-test.sh "${IMAGE_REF}"
