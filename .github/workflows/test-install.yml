name: Test bootc installation

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (default: latest)'
        required: false
        default: 'latest'

permissions: {}

env:
  IMAGE: ghcr.io/frostyard/snow

jobs:
  test-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Free disk space
        run: |
          sudo rm -rf /usr/lib/jvm /usr/share/dotnet /usr/share/swift \
            /usr/local/.ghcup /usr/local/lib/android /opt/microsoft \
            /opt/google /opt/az /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf podman skopeo

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.6.1"

      - name: Verify image signature
        env:
          TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          cosign verify --key cosign.pub "${IMAGE}:${TAG}"

      - name: Pull image
        env:
          TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          podman pull "${IMAGE}:${TAG}"

      - name: Run installation tests
        env:
          TAG: ${{ inputs.image_tag || 'latest' }}
        run: |
          ./test/bootc-install-test.sh "${IMAGE}:${TAG}"
