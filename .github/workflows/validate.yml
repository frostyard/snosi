name: Validate Scripts and Config

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  installer-redirect-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: workers/native-installer-redirect
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workers/native-installer-redirect/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test and validate Worker
        run: npm run check

      - name: Validate deployment bundle
        run: npm run deploy:dry-run

  shell-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify shellcheck is available
        # ShellCheck ships preinstalled on the ubuntu-latest runner image.
        # Avoid apt here because host-level apt-get update can fail on
        # unrelated preconfigured third-party mirrors, as seen in #381.
        run: shellcheck --version

      - name: Lint shell scripts
        # Discover scripts by first-line shebang instead of extension globs:
        # the repo has many extensionless scripts (mkosi.finalize, mkosi.clean,
        # in-image usr/libexec/* runtime scripts, sysext-setup scripts) that
        # *.sh/*.chroot missed entirely. saved-unused/ is dead code excluded
        # from builds.
        run: |
          {
            git ls-files '*.sh' '*.chroot'
            git ls-files | xargs awk 'FNR==1 && /^#!\/(usr\/)?bin\/(env )?(ba)?sh/ {print FILENAME} {nextfile}' 2>/dev/null
          } | grep -v '^saved-unused/' | sort -u | xargs -r shellcheck -S warning -x

      - name: Validate native A/B invariants
        run: ./test/native-ab-static-test.sh

      - name: Validate frozen native A/B contracts
        # docs/native-ab-contracts.md is the source of truth for native A/B
        # naming, paths, and policy; this is its executable form. No root,
        # no network, no image build. Also runs test/native-publish-test.sh
        # internally (below is a standalone run for clearer CI attribution
        # if only the publisher's naming drifts).
        run: ./test/native-ab-contracts-test.sh

      - name: Validate native A/B publication naming pipeline
        # shared/native-ab/publish/prepare-native-publication.sh turns
        # mkosi's internal split outputs into the frozen public §4 names.
        # Fixture GPT via truncate+sfdisk script mode -- no root, no
        # network, no image build.
        run: ./test/native-publish-test.sh

      - name: Validate native A/B publication and signing pipeline
        # shared/native-ab/publish/{publish-candidate,verify-remote,promote,
        # withdraw}.sh (Phase 7) against a synthetic fixture, a local
        # directory dest, and a local HTTP origin (test/lib/range-http-
        # server.py). Uses the committed DEV signing key/pubring (dev-only,
        # never production material). No root, no network beyond localhost,
        # no image build. The real-build QEMU rehearsal (test/native-ab-
        # publication-test.sh) needs root/KVM and is intentionally not run
        # in CI, matching every other QEMU harness in this repo.
        run: ./test/native-publication-pipeline-test.sh

      - name: Validate native A/B publication guard
        # A profile literally named cayo-ab, snow-ab, or snowfield-ab is
        # production-facing (docs/native-ab-contracts.md §15) and must never
        # be publishable without shim/Secure Boot/PCR signing/NvPCR/pubring
        # markers; the raw dev fixture must never gain them either.
        run: ./check-native-publication-guard.sh

      - name: Validate snosi-install CLI installer
        # shared/native-installer/tree/usr/libexec/snosi-install (Task 8.2):
        # index parsing/verification (good/tampered signed SHA256SUMS over a
        # local HTTP origin + ephemeral gpg key), disk-refusal filters
        # (fixture `lsblk -b -J -O` JSON), name derivation, the full
        # --non-interactive argument validation matrix, streamed-verify
        # mismatch handling (small fixture "disk image"), and --restage-mok
        # argument handling. No root, no network beyond localhost, no image
        # build, no real block device. Full end-to-end disk-write/LUKS/TPM/
        # MOK behavior needs a real product build and install target (Task
        # 8.3), intentionally out of scope for this fast per-PR check.
        run: ./test/snosi-install-test.sh

      - name: Validate snosi-setup GUI model
        # Pure-python test of setup_gui/model.py (validation, argv assembly,
        # proto-1 event parsing, disk-list/typed-confirm handling) against an
        # embedded --print-defaults fixture plus a live-drift check against
        # the real snosi-install. No GTK, no display, no root.
        run: python3 ./test/snosi-setup-model-test.py

      - name: Validate snosi-setup GUI pages
        # Widget-level regression test of setup_gui/pages.py (Features page
        # keeps Next enabled -- the page is entirely optional). Requires
        # GTK4/libadwaita + a display; skips cleanly (exit 0) where either
        # is missing (stock runners), and runs for real on GTK-equipped
        # hosts (pages.py syntax is covered by the model test's py_compile).
        run: python3 ./test/snosi-setup-pages-test.py

      - name: Validate snosi-firstboot provisioning script
        # Fixture test with PATH-stubbed updex/flatpak: feature enablement
        # fan-out, flathub remote + deduplicated core set, retry semantics
        # (any failure -> exit 1, no done marker -> the unit retries next
        # boot), and the no-op paths. No root, no network, no image build.
        run: ./test/snosi-firstboot-test.sh

      - name: Validate snosi-etc-diff drift tooling
        # Static, non-root regression test driving the real script against
        # fixture trees via its SNOSI_ETC_DIFF_LIVE_ETC/PRISTINE_ETC test
        # hooks. No root, no bind mount, no image build.
        run: ./test/snosi-etc-diff-test.sh

  runtime-etc-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Forbid runtime /etc deletions in shipped payloads
        # Runtime `systemctl disable` (and friends) deletes .wants symlinks
        # from the live /etc; on bootc/composefs installs that makes the
        # /etc merge fail at update finalize and staged updates are silently
        # discarded. See CLAUDE.md "Runtime service enablement changes are
        # forbidden".
        run: ./check-runtime-etc-guard.sh

  mkosi-config-sanity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: setup-mkosi
        uses: systemd/mkosi@3c3a08fb07d27fbe473625aa0725655cfb2c68bf

      - name: Validate mkosi configuration summaries
        run: |
          sudo mkosi summary > /dev/null
          ./check-profile-dependencies.sh
          for profile in cayo snow snowfield; do
            sudo mkosi --profile "$profile" summary > /dev/null
          done
