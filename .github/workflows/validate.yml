name: Validate Scripts and Config

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        # Discover scripts by first-line shebang instead of extension globs:
        # the repo has many extensionless scripts (mkosi.finalize, mkosi.clean,
        # in-image usr/libexec/* runtime scripts, sysext-setup scripts) that
        # *.sh/*.chroot missed entirely. saved-unused/ is dead code excluded
        # from builds.
        run: |
          {
            git ls-files '*.sh' '*.chroot'
            git ls-files | xargs awk 'FNR==1 && /^#!\/(usr\/)?bin\/(env )?(ba)?sh/ {print FILENAME} {nextfile}' 2>/dev/null
          } | grep -v '^saved-unused/' | sort -u | xargs -r shellcheck -S warning -x

  runtime-etc-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Forbid runtime /etc deletions in shipped payloads
        # Runtime `systemctl disable` (and friends) deletes .wants symlinks
        # from the live /etc; on bootc/composefs installs that makes the
        # /etc merge fail at update finalize and staged updates are silently
        # discarded. See CLAUDE.md "Runtime service enablement changes are
        # forbidden".
        run: ./check-runtime-etc-guard.sh

  mkosi-config-sanity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: setup-mkosi
        uses: systemd/mkosi@3c3a08fb07d27fbe473625aa0725655cfb2c68bf

      - name: Validate mkosi configuration summaries
        run: |
          sudo mkosi summary > /dev/null
          ./check-profile-dependencies.sh
          for profile in cayo cayoloaded snow snowloaded snowfield snowfieldloaded; do
            sudo mkosi --profile "$profile" summary > /dev/null
          done
