[Config]
# list base + any sysexts that get built by default
Dependencies=base
             1password
             1password-cli
             azurevpn
             bitwarden
             claude-desktop
             code-server
             coder
             debdev
             dev
             docker
             edge
             incus
             lemonade
             nix
             podman
             tailscale
             vscode


[Distribution]
Distribution=debian
Release=trixie
Repositories=main,contrib,non-free,non-free-firmware

[Build]
History=yes
ToolsTree=default
ToolsTreeSandboxTrees=mkosi.tools.sandbox
# systemd-measure (ukify's PCR-policy signer, used by the secure native profiles)
# lives in the systemd-tpm package on Debian testing's systemd 261 — it is NOT
# pulled into the default tools tree transitively (it was until the 261.1-2 ->
# 261.1-3 dependency change, which is why secure builds began failing with
# "No such file or directory: /usr/lib/systemd/systemd-measure"). Install it
# explicitly so ukify can always sign expected-PCR policies.
ToolsTreePackages=systemd-tpm
CacheDirectory=mkosi.cache
Incremental=yes
WithNetwork=true

# Most of this gets overridden by the profiles specified in the build command
# generally, nothing should override OutputDirectory.
[Output]
ImageId=main
OutputDirectory=output
Format=none

[Content]
Bootable=no
CleanPackageMetadata=no
WithDocs=yes
BaseTrees=%O/base

[Validation]
SecureBoot=no
