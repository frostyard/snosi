[Config]
Dependencies=base

[Output]
ImageId=1password
Output=1password
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh
FinalizeScripts=%D/shared/sysext/finalize/sysext-required-paths.sh,%D/shared/sysext/finalize/sysext-strip-icon-cache.sh

# 1Password desktop app. Installed by mkosi.postinst.chroot from a pinned
# .deb via verified_download (NOT Packages=1password from the apt repo: the
# deb's postinst unconditionally curls its signing key, and dpkg maintainer
# scripts run inside the buildroot without DNS, so the apt route fails —
# the postinst strips that channel setup, edge-style). The script then
# relocates /opt/1Password to /usr/lib/1Password, pins the helper-binary
# group GIDs, and regenerates the polkit policy.
#
# Runtime deps from the deb's Depends, kept explicit even though the base
# image currently satisfies all but gnupg2 — dpkg -i in the postinst needs
# them present, and any missing from base ship in the delta as intended.
Packages=curl
         gnupg2
         libasound2
         libatk-bridge2.0-0
         libatk1.0-0
         libcurl4
         libdrm2
         libgbm1
         libgtk-3-0
         libnotify4
         libnss3
         libxcb-shape0
         libxcb-xfixes0
         libxshmfence1
         libudev1
         xdg-utils

[Build]
Environment=KEYPACKAGE=1password
