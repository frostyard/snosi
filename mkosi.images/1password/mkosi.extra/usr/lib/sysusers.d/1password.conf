# Groups for the 1Password desktop helper binaries, created at boot after
# the sysext merge (reload-sysext.service re-runs systemd-sysusers). GIDs are
# pinned because the sysext ships binaries chgrp'ed + setgid to these groups
# (see mkosi.postinst.chroot) and numeric ownership must match at runtime.
# GID 1937 is reserved for a future onepassword-cli group.
g onepassword 1936
g onepassword-mcp 1938
