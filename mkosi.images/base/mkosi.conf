

[Output]
Format=directory
ImageVersion=
ManifestFormat=json

[Content]
Bootable=no
CleanPackageMetadata=no
WithDocs=yes
# Sysext base requirements
# Keep package metadata so sysexts can properly extend
Packages=erofs-utils
         zstd
         btrfs-progs
         ca-certificates
         curl
         dracut
         dosfstools
         e2fsprogs
         fdisk
         git
         git-lfs
         gpg
         iproute2
         iputils-ping
         rsync
         skopeo
         sudo
         tpm2-tools
         libcap2-bin
         attr
         xfsprogs
         systemd-cryptsetup
         libfido2-1
         libfido2-dev
         libtss2-esys-3.0.2-0
         libp11-kit0
         systemd
         systemd-boot
         kmod
         lvm2
         frostyard-nbc
         frostyard-updex
         efibootmgr
         shim-signed
         systemd-resolved

# bootc + ostree, built and published as debs by frostyard/bootc-debian
# (same pinned tarballs/toolchain the former in-tree BuildScript used).
# libostree-1-1 ships the library AND the ostree CLI; bootc Depends on it.
Packages=bootc
         libostree-1-1

# ostree/bootc runtime libraries. The bootc-debian debs declare only a partial
# Depends list (libcurl4t64, libglib2.0-0t64, libgpgme11t64, libarchive13t64,
# libsystemd0, zlib1g), so keep the full set of runtime link deps explicit —
# libfuse3-4, libsoup-3.0-0, liblzma5 etc. are NOT pulled in by the debs.
Packages=libcurl4t64
         libglib2.0-0t64
         libgpgme11t64
         libarchive13t64
         libsystemd0
         zlib1g
         libfuse3-4
         libsoup-3.0-0
         liblzma5
         libzstd1
         libmount1
         libselinux1
         libcom-err2
         libext2fs2t64

# Locales and keyboard
Packages=locales
         keyboard-configuration

# NetworkManager
Packages=network-manager
         network-manager-applet
         wpasupplicant

# Shell alternatives
Packages=fish
         zsh

# Utilities
Packages=vim
         netcat-traditional
         openssh-server
         cifs-utils
         wget
         gcc
         g++
         make
         dpkg-dev
         procps

# virtiofs host daemon: shares host directories with VMs; required by bcvk
# (bootc VM test tool), which only finds it at standard system paths
Packages=virtiofsd

# Microcode
Packages=amd64-microcode
         intel-microcode
         iucode-tool

# Firmware update
Packages=fwupd
         fwupd-amd64-signed

# System utilities
Packages=jq
         less
         file
         hdparm
         kbd
         bc
         bolt
         iio-sensor-proxy

# initramfs
Packages=klibc-utils
         kpartx

# Misc
Packages=bash-completion
         appstream
         gnupg
         pcscd
         rtkit
         low-memory-monitor
         wireless-regdb
         usb-modeswitch
         usb-modeswitch-data
         usbmuxd
         sane-utils
         sane-airscan
         exfatprogs
         ntfs-3g
         unzip
         util-linux


# Containers/Incus support
Packages=apparmor
         nftables
         libbinutils
         libgprofng0
         binutils-common
         binutils-x86-64-linux-gnu
         distro-info-data
         gdisk
         ubuntu-keyring

