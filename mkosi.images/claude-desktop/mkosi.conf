[Config]
Dependencies=base

[Output]
ImageId=claude-desktop
Output=claude-desktop
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh
FinalizeScripts=%D/shared/sysext/finalize/sysext-required-paths.sh,%D/shared/sysext/finalize/sysext-strip-icon-cache.sh

# Claude desktop app (from downloads.claude.ai/claude-desktop/apt in
# mkosi.sandbox). Installs entirely under /usr — no /opt relocation needed.
# libglib2.0-bin pins the deb's trash-handler alternation
# (kde-cli-tools | kde-runtime | trash-cli | libglib2.0-bin | gvfs). Base
# currently satisfies it (it ships libglib2.0-bin and gvfs via its dependency
# chain), but if base ever stops, apt would install the FIRST alternative and
# silently drag the KDE dependency chain into the delta.
Packages=claude-desktop
         libglib2.0-bin

[Build]
Environment=KEYPACKAGE=claude-desktop
