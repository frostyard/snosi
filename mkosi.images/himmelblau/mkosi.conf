[Config]
Dependencies=base

[Output]
ImageId=himmelblau
Output=himmelblau
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh
FinalizeScripts=%D/shared/sysext/finalize/sysext-required-paths.sh,%D/shared/sysext/finalize/sysext-strip-icon-cache.sh

# Himmelblau Entra ID authentication (from himmelblau-idm.org nightly repo)
Packages=himmelblau
         pam-himmelblau
         nss-himmelblau

[Build]
Environment=KEYPACKAGE=himmelblau
