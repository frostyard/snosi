[Config]
Dependencies=base

[Output]
ImageId=incus
Output=incus
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh
FinalizeScripts=%D/shared/sysext/finalize/sysext-required-paths.sh

# Incus (from Debian trixie)
Packages=incus
         incus-extra
         incus-ui-canonical
         dnsmasq-base
         ovmf
         qemu-kvm
         qemu-utils
         qemu-system-gui
         qemu-system-modules-spice
         ipxe-qemu
         genisoimage
         virt-viewer

[Build]
Environment=KEYPACKAGE=incus
# r1 (2026-07-06): republish with the multi-user.target.d Upholds drop-in
# (52b2bfb landed after the last package-version-keyed publish) and supersede
# the broken 202607011055 build. Remove when the incus package version bumps.
Environment=SYSEXT_REVISION=1
