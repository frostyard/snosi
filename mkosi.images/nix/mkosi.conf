[Config]
Dependencies=base

[Output]
ImageId=nix
Output=nix
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh

# Nix package manager
Packages=nix-setup-systemd

[Build]
Environment=KEYPACKAGE=nix-setup-systemd
