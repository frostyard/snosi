[Config]
Dependencies=base

[Output]
ImageId=nix
Output=nix
Overlay=yes
ManifestFormat=json
Format=sysext

[Content]
Bootable=no
BaseTrees=%O/base
PostOutputScripts=%D/shared/sysext/postoutput/sysext-postoutput.sh
FinalizeScripts=%D/shared/sysext/finalize/sysext-required-paths.sh,%D/shared/sysext/finalize/sysext-strip-icon-cache.sh

# Nix package manager
Packages=nix-setup-systemd

[Build]
Environment=KEYPACKAGE=nix-setup-systemd
# r1 (2026-07-06): nix-setup-systemd version has not bumped since 2026-03;
# republish so the sysext picks up the multi-user.target.d Upholds drop-in
# (52b2bfb) and all tree fixes since March. Remove when the package version bumps.
Environment=SYSEXT_REVISION=1
