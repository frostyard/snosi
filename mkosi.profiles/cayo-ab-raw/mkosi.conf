[Config]
Dependencies=
Dependencies=base

[Output]
ManifestFormat=json
ImageId=cayo
Output=cayo-ab-raw

[Content]
Bootloader=systemd-boot
UnifiedKernelImages=unsigned
Packages=systemd-boot-efi
# QEMU-only dev fixture: restrict the final-root module set to the virtio
# devices this profile's disk actually needs, so dracut's --no-hostonly
# initrd stays self-contained and mkosi's own dependency sweep doesn't fail
# resolving unrelated Debian module aliases. Production ships the full
# packaged module set (docs/native-ab-contracts.md §9) -- this filter must
# never be copied into cayo-ab, snow-ab, or snowfield-ab, and
# check-native-publication-guard.sh hard-fails any profile literally named
# one of those three if it carries a KernelModules= line of its own.
KernelModules=virtio_blk
              virtio_pci
              virtio_scsi
              virtio_net
               dm_verity
               dm_crypt
               dm_mod
              erofs
              ext4
              fat
              vfat
              nls_ascii
              nls_cp437
              nls_iso8859_1
              overlay
               autofs4
               binfmt_misc
               isofs
               nf_tables
               nfnetlink

[Include]
# cayo payload composition (tree, scripts, packages) -- no bootc packages
# fragment: native images must not ship bootc
Include=%D/shared/composition/cayo/mkosi.conf
Include=%D/shared/kernel/backports/mkosi.conf
Include=%D/shared/outformat/ab-root/mkosi.conf
Include=%D/shared/native-ab/channels/cayo/mkosi.conf
