[Config]
Dependencies=
Dependencies=base

[Output]
ManifestFormat=json
ImageId=cayo
Output=cayo-ab-secure

[Build]
# Forky is available only while assembling this profile. Its low pin prevents
# unrelated packages from crossing the Trixie boundary.
SandboxTrees=%D/shared/cayo-ab-secure/package-manager
# Make archived keys available only inside mkosi's tool sandbox. The wrapper
# selects one by filename only when PCR_SIGNING_KEY_PREVIOUS is set.
SandboxTrees=%D/.snosi-private/history:/usr/lib/snosi-pcr-history
ExtraSearchPaths=%D/shared/cayo-ab-secure/tools
Environment=PCR_SIGNING_KEY_PREVIOUS

[Content]
FinalizeScripts=%D/shared/cayo-ab-secure/finalize/disable-nvpcr.chroot
Bootloader=systemd-boot
ShimBootloader=signed
# "unsigned" selects local UKI construction; SecureBoot=yes signs its output.
# Mkosi's "signed" mode instead searches for a distro-prebuilt UKI.
UnifiedKernelImages=unsigned
Packages=mokutil
         shim-signed
         libnss-myhostname/forky
         libnss-mymachines/forky
         libnss-systemd/forky
         libpam-systemd/forky
         libsystemd-shared/forky
         libsystemd0/forky
         libudev1/forky
         systemd/forky
         systemd-boot/forky
         systemd-boot-efi/forky
         systemd-boot-tools/forky
         systemd-container/forky
         systemd-cryptsetup/forky
         systemd-repart/forky
         systemd-resolved/forky
         systemd-sysv/forky
         systemd-timesyncd/forky
         systemd-tpm/forky
         udev/forky

[Validation]
# Local spike credentials are gitignored. The certificate must be enrolled as
# a MOK because Debian shim does not trust locally signed snosi UKIs by default.
SecureBoot=yes
SecureBootAutoEnroll=no
SecureBootKey=%D/mkosi.key
SecureBootCertificate=%D/mkosi.crt
SignExpectedPcr=yes
SignExpectedPcrKey=%D/.snosi-private/pcr-signing.key
SignExpectedPcrCertificate=%D/.snosi-private/pcr-signing.crt

[Include]
# cayo payload composition (tree, scripts, packages) -- no bootc packages
# fragment: native images must not ship bootc
Include=%D/shared/composition/cayo/mkosi.conf
Include=%D/shared/kernel/backports/mkosi.conf
Include=%D/shared/outformat/ab-root/mkosi.conf
Include=%D/shared/native-ab/channels/cayo/mkosi.conf
