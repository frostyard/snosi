# SPDX-License-Identifier: LGPL-2.1-or-later
#
# Network-installer ISO profile (docs/native-ab-contracts.md §8, Phase 8 of
# docs/plans/2026-07-14-bootc-native-ab-coexistence-plan.md). Independent of
# every other profile: no BaseTrees (cancels the root mkosi.conf's
# BaseTrees=%O/base -- this profile must never inherit the shared bootc/
# sysext base image) and no Dependencies (builds nothing else first).
#
# Not itself an ISO: mkosi produces a plain rootfs directory
# (shared/native-installer/mkosi.conf sets Format=directory). Turning that
# into the actual bootable ISO -- assembling the Debian-signed shim/GRUB/
# kernel chain and the El Torito/GPT-hybrid disc image -- is a separate step
# run after `mkosi --profile native-installer build`:
# shared/native-installer/tools/build-iso.sh. See `just native-installer-iso`.

[Config]
Dependencies=

[Output]
ImageId=native-installer
Output=native-installer

[Content]
BaseTrees=

[Include]
Include=%D/shared/native-installer/mkosi.conf
