[Config]
Dependencies=
Dependencies=base

[Output]
ManifestFormat=json
ImageId=snow
Output=snow-ab

[Include]
# Secure posture fragment first so its FinalizeScripts=disable-nvpcr resolves
# before the composition fragment's image finalize (mkosi accumulates list
# settings in Include= encounter order) -- verified via mkosi summary.
Include=%D/shared/native-ab-secure/mkosi.conf
# snow payload composition (tree, scripts, packages) -- no bootc packages
# fragment: native images must not ship bootc
Include=%D/shared/composition/snow/mkosi.conf
Include=%D/shared/kernel/backports/mkosi.conf
Include=%D/shared/outformat/ab-root/mkosi.conf
Include=%D/shared/native-ab/channels/snow/mkosi.conf
