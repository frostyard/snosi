[Content]
# cayo tree
ExtraTrees=%D/shared/cayo/tree

# dracut
PostInstallationScripts=%D/shared/kernel/scripts/postinst/mkosi.postinst.chroot
# image customizations
PostInstallationScripts=%D/shared/cayo/scripts/postinstall/cayo.postinst.chroot
# brew build script
BuildScripts=%D/shared/scripts/build/brew.chroot
# manifest postoutput
PostOutputScripts=%D/shared/manifest/postoutput/mkosi.postoutput
# image finalize
FinalizeScripts=%D/shared/outformat/image/finalize/mkosi.finalize.chroot
# per-product /var factory-state audit (must run after the image finalize
# above, which performs native dpkg relocation; see CLAUDE.md "Native /var
# Factory State")
FinalizeScripts=%D/shared/composition/var-audit.finalize

[Include]
# cayo packages
Include=%D/shared/packages/cayo/mkosi.conf
