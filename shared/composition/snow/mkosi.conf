[Content]
# snow tree
ExtraTrees=%D/shared/snow/tree

# The snow tree also carries the Snow plymouth theme (two-step config +
# flower watermark under usr/share/plymouth/themes/, Theme=snow in
# etc/plymouth/plymouthd.conf). ExtraTrees is the correct delivery point:
# the final initrd is generated by the dracut PostInstallationScript below,
# which runs AFTER ExtraTrees land, so plymouth-populate-initrd sees the
# theme; and the plymouthd.conf overwrite happens after dpkg finishes, so
# there is no interactive conffile prompt (a SkeletonTrees copy of that
# conffile hard-fails the build: dpkg prompts on a pre-existing conffile at
# install and hits EOF on mkosi's non-interactive stdin).
# Graphical plymouth splash. Effective only on the native A/B profiles
# (snow-ab/snowfield-ab), where it lands in the signed UKI .cmdline; inert
# on the bootc profiles (no UKI is built -- bootc injects rhgb quiet at
# install time instead). cayo never includes this fragment: servers stay
# text-mode. plymouth.ignore-serial-consoles is REQUIRED for the splash to
# exist at all: the shared native cmdline carries console=ttyS0, and a
# configured serial console otherwise makes plymouthd force details mode
# globally and skip DRM probing entirely (proven via plymouth.debug in QEMU,
# 2026-07-17). Serial keeps kernel messages, systemd status, and raw
# ask-password prompts -- plymouth just no longer manages ttyS0. The splash
# itself runs from the REAL ROOT only; see the plymouth note in
# shared/outformat/ab-root/tree/usr/lib/dracut/dracut.conf.d/30-bootc-standard.conf.
# quiet: hide pre-splash kernel text on the local display (console=tty0 is
# preferred on desktop natives, so kernel messages would otherwise paint the
# screen for the few seconds before the real-root splash starts). Errors
# (loglevel <= err) still print, on both tty0 and serial.
KernelCommandLine=splash plymouth.ignore-serial-consoles quiet

# dracut
PostInstallationScripts=%D/shared/kernel/scripts/postinst/mkosi.postinst.chroot
# image customizations
PostInstallationScripts=%D/shared/snow/scripts/postinstall/snow.postinst.chroot
# brew build script
BuildScripts=%D/shared/scripts/build/brew.chroot
# hotedge build script
BuildScripts=%D/shared/snow/scripts/build/hotedge.chroot
# logomenu build script
BuildScripts=%D/shared/snow/scripts/build/logomenu.chroot
# bazaar companion build script
BuildScripts=%D/shared/snow/scripts/build/bazaar.chroot
# surface cert
BuildScripts=%D/shared/snow/scripts/build/surface-cert.chroot
# manifest postoutput
PostOutputScripts=%D/shared/manifest/postoutput/mkosi.postoutput
# image finalize
FinalizeScripts=%D/shared/outformat/image/finalize/mkosi.finalize.chroot
# per-product /var factory-state audit (must run after the image finalize
# above, which performs native dpkg relocation; see CLAUDE.md "Native /var
# Factory State")
FinalizeScripts=%D/shared/composition/var-audit.finalize

[Include]
# snow packages
Include=%D/shared/packages/snow/mkosi.conf
