# SPDX-License-Identifier: LGPL-2.1-or-later
#
# Shared secure posture fragment for the three production native A/B profiles
# (cayo-ab, snow-ab, snowfield-ab -- docs/native-ab-contracts.md §1). Every
# consumer Include=s this fragment; it carries everything the former
# cayo-ab-secure spike profile owned EXCEPT identity (the [Output] block,
# which stays per-profile so ImageId/Output differ) and the payload/kernel/
# channel Include=s (also per-profile, since they select cayo/snow/snowfield
# composition, kernel, and channel).

[Build]
# Forky is available only while assembling this profile. Its low pin prevents
# unrelated packages from crossing the Trixie boundary.
SandboxTrees=%D/shared/native-ab-secure/package-manager
# Make archived keys available only inside mkosi's tool sandbox. The wrapper
# selects one by filename only when PCR_SIGNING_KEY_PREVIOUS is set.
SandboxTrees=%D/.snosi-private/history:/usr/lib/snosi-pcr-history
ExtraSearchPaths=%D/shared/native-ab-secure/tools
Environment=PCR_SIGNING_KEY_PREVIOUS

[Content]
FinalizeScripts=%D/shared/native-ab-secure/finalize/disable-nvpcr.chroot
# Force kernel lockdown to at least "integrity" explicitly rather than
# relying on each kernel flavor's own compiled-in default. Debian's
# backports kernel (cayo-ab/snow-ab) happens to auto-raise lockdown when it
# detects enforced EFI Secure Boot, but linux-surface (snowfield-ab) ships
# CONFIG_LOCK_DOWN_KERNEL_FORCE_NONE=y with no Secure-Boot-to-lockdown
# wiring at all (confirmed via its .config, Phase 6) -- under enforced SB
# with a Measured, MOK-signed UKI, /sys/kernel/security/lockdown stayed at
# "none". Module-signature enforcement turned out to be wired directly to
# EFI Secure Boot detection independent of the Lockdown LSM's reported
# level (an unsigned test module was still rejected even at lockdown=none),
# but lockdown's OTHER protections (kexec restriction, /dev/mem, debugfs,
# BPF, hibernation, ...) were genuinely inactive -- a real gap.
# `lockdown=` is a standard early_param that can only RAISE the compiled
# initial level (lock_kernel_down() takes effect only when the requested
# level is stricter), so this is a safe, idempotent floor for cayo-ab/
# snow-ab too, not just a snowfield-ab-specific patch.
KernelCommandLine=lockdown=integrity
Bootloader=systemd-boot
ShimBootloader=signed
# "unsigned" selects local UKI construction; SecureBoot=yes signs its output.
# Mkosi's "signed" mode instead searches for a distro-prebuilt UKI.
UnifiedKernelImages=unsigned
Packages=mokutil
         shim-signed
         libnss-myhostname/forky
         libnss-mymachines/forky
         libnss-systemd/forky
         libpam-systemd/forky
         libsystemd-shared/forky
         libsystemd0/forky
         libudev1/forky
         systemd/forky
         systemd-boot/forky
         systemd-boot-efi/forky
         systemd-boot-tools/forky
         systemd-container/forky
         systemd-cryptsetup/forky
         systemd-repart/forky
         systemd-resolved/forky
         systemd-sysv/forky
         systemd-timesyncd/forky
         systemd-tpm/forky
         udev/forky

[Validation]
# Local spike credentials are gitignored. The certificate must be enrolled as
# a MOK because Debian shim does not trust locally signed snosi UKIs by default.
SecureBoot=yes
SecureBootAutoEnroll=no
SecureBootKey=%D/mkosi.key
SecureBootCertificate=%D/mkosi.crt
SignExpectedPcr=yes
SignExpectedPcrKey=%D/.snosi-private/pcr-signing.key
SignExpectedPcrCertificate=%D/.snosi-private/pcr-signing.crt
