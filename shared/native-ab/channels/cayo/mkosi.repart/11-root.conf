[Partition]
Type=root
Format=erofs
Label=cayo_%A_r
Verity=data
VerityMatchKey=root
CopyFiles=/
ExcludeFilesTarget=/var/
# docs/native-ab-contracts.md §12: 5 GiB, measured 2026-07-14 under the full
# module/firmware policy (no KernelModules= filter), original measurement
# from the cayo-ab-secure spike and reconfirmed 2026-07-14 against the real
# production cayo-ab build (Task 3.2): mkfs.erofs measured ~4093140992 B
# against a 5368709120 B slot = ~23.8% headroom under the spare/total-slot
# headroom rule (§12). See docs/native-ab-capacities.md.
SizeMinBytes=5G
SizeMaxBytes=5G
SplitName=cayo_@v.root.raw
