[Partition]
Type=root
Format=erofs
Label=cayo_%A_r
Verity=data
VerityMatchKey=root
CopyFiles=/
ExcludeFilesTarget=/var/
# docs/native-ab-contracts.md §12: 5 GiB, measured 2026-07-14 under the full
# module/firmware policy (cayo-ab-secure, no KernelModules= filter):
# mkfs.erofs measured 4092997632 B against a 5368709120 B slot = ~23.8%
# headroom under the spare/total-slot headroom rule (§12). See
# docs/native-ab-capacities.md.
SizeMinBytes=5G
SizeMaxBytes=5G
SplitName=cayo_@v.root.raw
