ExtraTrees=%D/shared/native-ab/channels/snow/tree
# console=tty0 must be the LAST console= argument on the resolved cmdline
# (after the ab-root fragment's console=ttyS0), and the channel fragment is
# the only desktop-native fragment [Include]d after ab-root in the profile.
# Last console= wins /dev/console: with the VT preferred, plymouthd's local
# console has a real terminal (avoiding the 24.004.60 NULL-terminal
# segfault in the DRM renderer's input path that a serial /dev/console +
# plymouth.ignore-serial-consoles triggers) and the graphical splash
# renders. Serial keeps kernel printk (printk goes to every console); the
# serial LUKS prompt is restored by snosi-ask-password-serial.* (ab-root
# tree). See shared/composition/snow/mkosi.conf's plymouth note.
KernelCommandLine=console=tty0
