[Partition]
Type=root
Format=erofs
Label=snow_%A_r
Verity=data
VerityMatchKey=root
CopyFiles=/
ExcludeFilesTarget=/var/
# PROVISIONAL (docs/native-ab-contracts.md §12): mkfs.erofs of the existing
# snow bootc directory build (output/snow, 2026-07-14, full production
# module set, /var excluded) measured 6047731712 bytes (~5.63 GiB). 7 GiB
# gives ~24% headroom (>=20% required). Reused for both snow and snowfield
# per the Phase 3 brief -- overestimates snow-ab slightly (this measurement
# still includes bootc/ostree/grub tooling that native profiles never
# install), which is conservative, not exact. Finalized in Phase 5/6 from a
# production-module-policy measurement of the actual native profile.
# See docs/native-ab-capacities.md.
SizeMinBytes=7G
SizeMaxBytes=7G
SplitName=snow_@v.root.raw
