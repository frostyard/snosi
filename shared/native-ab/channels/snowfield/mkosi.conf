ExtraTrees=%D/shared/native-ab/channels/snowfield/tree
# console=tty0 must be the LAST console= argument on the resolved cmdline
# (after the ab-root fragment's console=ttyS0) -- same rationale as the
# snow channel: /dev/console on the VT keeps plymouthd's local terminal
# non-NULL (avoids the 24.004.60 DRM-input-path segfault) and lets the
# graphical splash render. Serial LUKS prompts come from
# snosi-ask-password-serial.* in the ab-root tree.
KernelCommandLine=console=tty0
