# SPDX-License-Identifier: LGPL-2.1-or-later
#
# Content fragment for mkosi.profiles/native-installer (docs/native-ab-contracts.md
# §8, "Installer ISO boot chain"; docs/plans/2026-07-14-bootc-native-ab-coexistence-
# plan.md "Installer ISO"). Payload-free network-installer environment: no Snow,
# Snowfield, or Cayo content. The ISO itself boots through a fully Debian-trusted
# pre-enrollment Secure Boot chain (Microsoft db -> Debian-signed shim -> Debian-
# signed GRUB -> Debian-signed stock kernel), assembled entirely OUTSIDE mkosi by
# shared/native-installer/tools/build-iso.sh (mkosi has no ISO/El Torito output
# format -- checked the pinned man page's Format= enumeration). This fragment only
# produces the plain rootfs directory that script packs into the ISO's ESP and
# initramfs.
#
# Bootable=no and no ShimBootloader=/SecureBoot=/UnifiedKernelImages= here:
# mkosi's own UKI/systemd-boot signing pipeline is not used at all for this
# profile. The kernel that actually boots is Debian's OWN Secure-Boot-signed
# stock package (see shared/native-installer/tools/build-iso.sh), not anything
# mkosi builds or signs.

[Output]
Format=directory
ManifestFormat=json

[Build]
# Forky sandbox reused verbatim from the production native-ab secure fragment
# (same directory, not copied) -- docs/native-ab-contracts.md §8 requires a
# coherent Forky systemd 261 cryptsetup/TPM family in the installer userspace
# even though the boot KERNEL stays Debian-signed stock trixie.
SandboxTrees=%D/shared/native-ab-secure/package-manager

[Content]
Bootable=no
CleanPackageMetadata=yes
WithDocs=no

# Pre-seed first-boot identity at BUILD time (mkosi runs systemd-firstboot
# itself and writes /etc/{locale.conf,localtime,hostname,shadow} directly)
# so systemd-firstboot.service has nothing left to ask at runtime.
# Root-caused live: with these unset, systemd-firstboot.service blocks the
# WHOLE boot indefinitely on an interactive timezone prompt on the serial
# console -- no TTY is feeding it an answer, so it hangs forever (looked
# exactly like a silent kernel/systemd deadlock until traced to this).
# RootPassword=hashed: (colon, no hash after it) is mkosi's documented way
# to create an UNLOCKED account with no password -- appropriate here: SSH
# access is still gated on PermitRootLogin prohibit-password (Debian's
# default, unchanged) plus the installer's own injected authorized_keys,
# so this only affects local serial/console login, exactly the "serial
# login" path docs/native-ab-contracts.md §8 names as a boot-chain proof
# path alongside SSH.
Locale=C.UTF-8
Keymap=us
Timezone=UTC
Hostname=snosi-installer
RootPassword=hashed:

# Coherent Forky systemd 261 family (cryptsetup/TPM enrollment tooling must be
# 261, not trixie's older systemd -- contract §8, "257-created tokens are
# unsupported"). Deliberately excludes systemd-boot*/systemd-container: this
# profile never uses systemd-boot, and per-A/B-slot bootloader packages don't
# belong in a payload-free installer.
Packages=libnss-myhostname/forky
         libnss-mymachines/forky
         libnss-systemd/forky
         libpam-systemd/forky
         libsystemd-shared/forky
         libsystemd0/forky
         libudev1/forky
         systemd/forky
         systemd-cryptsetup/forky
         systemd-resolved/forky
         systemd-sysv/forky
         systemd-timesyncd/forky
         systemd-tpm/forky
         udev/forky

# Debian-trusted Secure Boot boot chain material -- stays on the trixie
# release (NOT forky) since these carry Debian's actual Secure Boot
# signatures for THIS release; shared/native-installer/tools/build-iso.sh
# pulls the signed binaries straight out of this built tree.
#   - shim-signed: EFI/BOOT/BOOTX64.EFI (Microsoft-signed).
#   - grub-efi-amd64-signed: the monolithic Debian-signed grub2 EFI image.
#   - shim-helpers-amd64-signed: MokManager (mmx64.efi) + the fallback
#     loader (fbx64.efi), Debian-signed. NOT shipped by shim-signed itself.
#   - linux-image-amd64: stock trixie kernel, confirmed Debian-signed
#     ("Debian Secure Boot Signer 2022 - linux" / "Debian Secure Boot CA",
#     verified via sbverify against the real .deb) -- not backports, whose
#     signed status was not independently verified for this task.
#   - mokutil: post-install MOK enrollment tool the CLI installer stages
#     (docs/plans/... "First-Round CLI Installer" step 16-17); also used by
#     the boot-chain proof itself (mokutil --sb-state inside the guest).
Packages=shim-signed
         grub-efi-amd64-signed
         shim-helpers-amd64-signed
         linux-image-amd64
         mokutil

# Networking (brief: NetworkManager-based, since it composes with the CLI
# installer step "start networking and synchronize time").
Packages=network-manager
         wpasupplicant
         iproute2
         iputils-ping
         openssh-server

# Storage tools for the CLI installer's disk-imaging step (matches the tool
# set test/cayo-ab-install-spike.sh already exercises: sfdisk from
# util-linux (already essential, not listed explicitly), cryptsetup,
# mkfs.ext4 from e2fsprogs).
Packages=gdisk
         cryptsetup
         xz-utils
         e2fsprogs
         dosfstools

# OpenPGP verification (signed index verification, contract §4) and TPM
# enrollment userspace.
Packages=gpgv
         tpm2-tools

# General installer utilities.
Packages=jq
         curl

PostInstallationScripts=%D/shared/native-installer/postinst/mkosi.postinst.chroot
