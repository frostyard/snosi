[Build]
# Activation policy build knob (docs/plans/2026-07-14-bootc-native-ab-
# coexistence-plan.md, "Activation policy", Phase 4). Environment= with a
# bare name forwards the host env var of the same name into
# prepare/build/postinstall/finalize scripts (mkosi.1 "Environment="),
# including the .chroot FinalizeScripts= below -- this is how
# shared/outformat/ab-root/finalize/mkosi.finalize.chroot decides whether to
# create the static snosi-sysupdate-stage.timer wants-link. Unset (or
# anything other than "1") in every profile until the first publication-
# enabled release; see that finalize script for the full rationale.
Environment=SNOSI_NATIVE_AUTOSTAGE

[Output]
Format=disk
SplitArtifacts=partitions,uki,repart-definitions,roothash
# RepartDirectories= is product-specific (partition labels, slot sizes) and
# lives in shared/native-ab/channels/<product>/mkosi.conf. Every consumer of
# this generic fragment must also Include= exactly one channel fragment.

[Content]
Bootable=yes
# Factory UKI naming (docs/native-ab-contracts.md §1, §6): mkosi's own
# default UKI name is "&e-&k-&h" (entry-token-kernelversion-roothash, e.g.
# "cayo-7.0.13+deb13-amd64-<hash>.efi"), which never matches the channel
# transfer's MatchPattern=<channel>_@v.efi -- so systemd-sysupdate's
# installed-version accounting (list/pending/vacuum/InstancesMax) never sees
# the factory-shipped UKI, and systemd-boot carries it forever as a third,
# unmanaged menu entry no update ever supersedes. &e alone (no -&k/-&h
# suffix) reproduces exactly the "<channel>_<version>.efi" shape sysupdate
# expects, matching how it names UKIs it installs itself (plus its own
# +tries-left-tries-done suffix, which this format does not need to
# reproduce -- sysupdate appends that itself on install). The roothash is
# still embedded in the UKI's kernel cmdline (finalize_roothash), just not
# in the filename -- dropping it from the name loses nothing functional.
# find_entry_token() resolves &e via `kernel-install inspect`, which reads
# /etc/kernel/entry-token when present (kernel-install(8) "auto" entry-token
# mode, the default) -- shared/outformat/ab-root/finalize/mkosi.finalize.chroot
# writes that file to "<channel>_<version>.efi"'s stem before mkosi's
# install_kernel() (which runs AFTER all FinalizeScripts=, per
# .mkosi/mkosi/__init__.py build_image()) reads it. No PostOutputScript can
# reach this: by the time PostOutputScripts= run, the ESP has already been
# formatted into the disk image by systemd-repart (CopyFiles=/boot:/ in
# shared/native-ab/channels/*/mkosi.repart/00-esp.conf) and mkosi's script
# sandbox has no loop-device/mount access to edit a FAT filesystem in place.
UnifiedKernelImageFormat=&e
# The kernel postinstall exports dracut's archive through io.mkosi.initrd.
# Disable mkosi's independent default and kernel-module initrd layers.
Initrds=
# No final-root KernelModules= filter here (docs/native-ab-contracts.md §9):
# release native profiles ship the complete packaged module/firmware set.
# The QEMU-only virtio filter lives in mkosi.profiles/cayo-ab-raw/mkosi.conf,
# the one dev fixture permitted to carry it.
KernelModulesInitrd=no
KernelCommandLine=console=ttyS0 rd.luks=1 rd.etc.overlay=1
# SkeletonTrees= copies into the OS tree BEFORE the package manager runs
# (mkosi install_skeleton_trees() precedes install_distribution(), which
# precedes install_extra_trees()). Some third-party kernel packages (found on
# the linux-surface repo, used by snowfield-ab) run their dracut
# initramfs-generation postinst hook SYNCHRONOUSLY at package-install time
# instead of deferring it via a dpkg trigger the way Debian's own
# linux-image-amd64 does; at that point the base image's copy of
# usr/lib/dracut/dracut.conf.d/30-bootc-standard.conf (which requests the
# `bootc` dracut module) is still in effect, since ExtraTrees= composition
# has not run yet, and that module is never installed on native profiles
# (`dracut[E]: Module 'bootc' cannot be found`, hard build failure). Shadow
# the same canonical file this early too -- single source of truth, no
# duplication -- so the request for `bootc` never reaches dracut regardless
# of which kernel package's postinst happens to run synchronously. The
# ExtraTrees= copy below is still required: it is what test/native-ab-static-
# test.sh checks, and it is also the one that survives if a future kernel
# ever ships something that overwrites this path during package install.
SkeletonTrees=%D/shared/outformat/ab-root/tree/usr/lib/dracut/dracut.conf.d/30-bootc-standard.conf:/usr/lib/dracut/dracut.conf.d/30-bootc-standard.conf
ExtraTrees=%D/shared/outformat/ab-root/tree
# Update signing pubring (docs/native-ab-contracts.md §7). Single canonical
# copy at shared/native-ab/keys/import-pubring.gpg -- do not duplicate it
# elsewhere in the tree. The pinned mkosi's ExtraTrees= supports a
# file:target pair directly (confirmed in .mkosi/mkosi/__init__.py
# install_tree: `src.is_dir() or (src.is_file() and target)`), so no
# non-chroot finalize copy step is needed. Every native profile (including
# the never-published cayo-ab-raw dev fixture) ships this file; the QEMU
# update tests use their own ephemeral keys and are unaffected.
ExtraTrees=%D/shared/native-ab/keys/import-pubring.gpg:/usr/lib/systemd/import-pubring.gpg
FinalizeScripts=%D/shared/outformat/ab-root/finalize/mkosi.finalize.chroot
