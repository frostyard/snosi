[Output]
Format=disk
SplitArtifacts=partitions,uki,repart-definitions,roothash
RepartDirectories=%D/shared/outformat/ab-root/mkosi.repart

[Content]
Bootable=yes
# The kernel postinstall exports dracut's archive through io.mkosi.initrd.
# Disable mkosi's independent default and kernel-module initrd layers.
Initrds=
# Keep the initrd self-contained for a raw virtio disk. Restricting this list
# avoids the broad dependency sweep that fails on unresolved Debian aliases.
KernelModules=virtio_blk
              virtio_pci
              virtio_scsi
              virtio_net
               dm_verity
               dm_crypt
               dm_mod
              erofs
              ext4
              fat
              vfat
              nls_ascii
              nls_cp437
              nls_iso8859_1
              overlay
               autofs4
               binfmt_misc
               isofs
               nf_tables
               nfnetlink
KernelModulesInitrd=no
KernelCommandLine=console=ttyS0 rd.luks=1 rd.etc.overlay=1
ExtraTrees=%D/shared/outformat/ab-root/tree
FinalizeScripts=%D/shared/outformat/ab-root/finalize/mkosi.finalize.chroot
