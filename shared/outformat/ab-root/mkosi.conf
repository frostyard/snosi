[Output]
Format=disk
SplitArtifacts=partitions,uki,repart-definitions,roothash
# RepartDirectories= is product-specific (partition labels, slot sizes) and
# lives in shared/native-ab/channels/<product>/mkosi.conf. Every consumer of
# this generic fragment must also Include= exactly one channel fragment.

[Content]
Bootable=yes
# The kernel postinstall exports dracut's archive through io.mkosi.initrd.
# Disable mkosi's independent default and kernel-module initrd layers.
Initrds=
# No final-root KernelModules= filter here (docs/native-ab-contracts.md §9):
# release native profiles ship the complete packaged module/firmware set.
# The QEMU-only virtio filter lives in mkosi.profiles/cayo-ab-raw/mkosi.conf,
# the one dev fixture permitted to carry it.
KernelModulesInitrd=no
KernelCommandLine=console=ttyS0 rd.luks=1 rd.etc.overlay=1
ExtraTrees=%D/shared/outformat/ab-root/tree
FinalizeScripts=%D/shared/outformat/ab-root/finalize/mkosi.finalize.chroot
