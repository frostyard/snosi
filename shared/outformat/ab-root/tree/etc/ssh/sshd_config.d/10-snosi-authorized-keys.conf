#
# /root (and every other local user's home directory) lives on the
# dm-verity-sealed, read-only root partition -- it can never be written to,
# neither at install time nor at runtime (CLAUDE.md "Immutable Filesystem
# Constraints"). The default AuthorizedKeysFile lookup
# (".ssh/authorized_keys", relative to the user's home) therefore can never
# resolve to anything real on a native A/B image.
#
# Add a second, additional location under the persistent /etc overlay
# (mounted from /var/lib/snosi/etc-overlay/upper by the 95etc-overlay
# dracut module before switch-root -- shared/outformat/ab-root/tree/usr/lib/
# dracut/modules.d/95etc-overlay/etc-overlay-mount.sh) so both
# `snosi-install --ssh-authorized-key` (docs/plans/2026-07-14-bootc-native-
# ab-coexistence-plan.md "First-Round CLI Installer" step 19) and an admin
# managing keys post-install have somewhere real to write. Debian's stock
# sshd_config already `Include /etc/ssh/sshd_config.d/*.conf`, so this drop-
# in alone is sufficient -- no base sshd_config edit needed.
AuthorizedKeysFile /etc/ssh/authorized_keys.d/%u .ssh/authorized_keys
