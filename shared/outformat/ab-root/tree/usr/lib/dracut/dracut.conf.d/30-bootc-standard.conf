# The native A/B image uses discoverable root and verity partitions. Keep the
# storage modules needed by the shared initramfs.
#
# The filename MUST stay 30-bootc-standard.conf, matching the base image's
# copy at mkosi.images/base/mkosi.extra/usr/lib/dracut/dracut.conf.d/
# 30-bootc-standard.conf byte-for-byte in path. ExtraTrees= composition
# overwrites files at identical relative paths (last ExtraTrees= wins for a
# given path), which is how this native copy REPLACES the bootc copy instead
# of both surviving into the same dracut.conf.d directory -- if the two ever
# diverged in filename, dracut would load both, re-adding the "bootc"
# dracut module (composefs boot) to an image that must never carry it.
# test/native-ab-static-test.sh asserts the two filenames stay identical.
add_dracutmodules+=" lvm crypt etc-overlay "
