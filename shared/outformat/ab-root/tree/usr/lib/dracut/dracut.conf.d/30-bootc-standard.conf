# The native A/B image uses discoverable root and verity partitions. Keep the
# storage modules needed by the shared initramfs.
#
# The filename MUST stay 30-bootc-standard.conf, matching the base image's
# copy at mkosi.images/base/mkosi.extra/usr/lib/dracut/dracut.conf.d/
# 30-bootc-standard.conf byte-for-byte in path. ExtraTrees= composition
# overwrites files at identical relative paths (last ExtraTrees= wins for a
# given path), which is how this native copy REPLACES the bootc copy instead
# of both surviving into the same dracut.conf.d directory -- if the two ever
# diverged in filename, dracut would load both, re-adding the "bootc"
# dracut module (composefs boot) to an image that must never carry it.
# test/native-ab-static-test.sh asserts the two filenames stay identical.
add_dracutmodules+=" lvm crypt etc-overlay "
# No plymouth in NATIVE initrds (cayo never installs it -- this is a no-op
# there; snow/snowfield DO ship it). Rationale, root-caused live in QEMU
# (plymouth.debug on a second serial, 2026-07-17): with console=ttyS0 on the
# baked cmdline, initrd plymouthd either forces details mode onto the serial
# console (no DRM probing at all), or -- with plymouth.ignore-serial-consoles
# -- loses a race against late DRM device creation (premature udev change
# event for card0 -> ENOENT -> permanent text-splash fallback; Debian's
# kernel has no simpledrm to provide an instant DRM device). The REAL ROOT's
# plymouth-start.service (statically wanted by sysinit.target) starts after
# DRM is long up and shows the graphical theme deterministically. Omitting
# plymouth here also means initrd LUKS passphrase prompts (first boot before
# TPM enrollment) come from systemd's raw console agent on /dev/console,
# which the QEMU harnesses' serial pump already understands.
omit_dracutmodules+=" plymouth "
# Serial ask-password agent for desktop natives (console=tty0 moves
# /dev/console -- and with it systemd-ask-password-console's prompt -- off
# the serial port; this restores the serial LUKS prompt the QEMU harness
# pump types into). Condition-gated in the units themselves; a no-op on
# cayo. Both the units and their static wants link must ride into the
# initrd, where the first-boot /var unlock actually prompts.
install_items+=" /usr/lib/systemd/system/snosi-ask-password-serial.service /usr/lib/systemd/system/snosi-ask-password-serial.path /usr/lib/systemd/system/sysinit.target.wants/snosi-ask-password-serial.path "
