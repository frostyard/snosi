#
# Native A/B only. Compiled aspell dictionaries (*.rws, generated by the
# aspell-autobuildhash dpkg trigger, not dpkg-tracked) are relocated at
# build time to /usr/lib/sysimage/aspell (see shared/outformat/image/
# finalize/mkosi.finalize.chroot). aspell reaches them through ABSOLUTE
# /usr/lib/aspell/<dict>.rws -> /var/lib/aspell/<dict>.rws symlinks in its
# dict-dir, so a fresh installer-created /var needs this symlink or every
# dictionary lookup dangles and spell-checking silently has no
# dictionaries. "L" (not "L+") intentionally leaves an existing entry alone
# instead of replacing it, so this stays inert if /var/lib/aspell is ever
# populated with real content again.
#
# Filename ordering is load-bearing: the base image ships its own
# aspell.conf tmpfiles rule creating `d /var/lib/aspell` as a plain
# directory, and tmpfiles.d(5) resolves same-path conflicts across files by
# lexicographic filename order (earliest-named file's line wins, the rest
# are logged as harmless "duplicate" errors, not a boot failure). The "00-"
# prefix makes this file sort before "aspell.conf" (and everything else),
# same as 00-snosi-dpkg.conf vs apt.conf — see that file for the local
# `systemd-tmpfiles --create --root=<scratch>` verification. Renaming this
# file would silently flip which one wins.
L /var/lib/aspell - - - - ../../usr/lib/sysimage/aspell
