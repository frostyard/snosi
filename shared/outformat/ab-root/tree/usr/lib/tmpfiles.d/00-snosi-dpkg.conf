#
# Native A/B only. The installer creates a fresh per-machine /var, so the
# real dpkg database (relocated at build time to /usr/lib/sysimage/dpkg,
# see shared/outformat/image/finalize/mkosi.finalize.chroot) has nothing to
# land on there. Recreate the same relative symlink the image itself ships
# so dpkg-query/dpkg -l keep working against the currently booted image
# root after an install. "L" (not "L+") intentionally leaves an existing
# entry alone instead of replacing it, so this stays inert if /var/lib/dpkg
# is ever populated with real content again.
#
# Filename ordering is load-bearing: apt's own shipped tmpfiles rule
# (/usr/lib/tmpfiles.d/apt.conf) also creates `d /var/lib/dpkg` as a plain
# directory. tmpfiles.d(5) resolves same-path conflicts across files by
# lexicographic filename order — "the entry in the file with the
# lexicographically earliest name will be applied [...] all other
# conflicting entries will be logged as errors." The "00-" prefix makes
# this file sort before "apt.conf" (and everything else), so our symlink
# line wins and apt.conf's directory line is the one skipped. Verified
# locally with `systemd-tmpfiles --create --root=<scratch>`: apt.conf's
# line logs "Duplicate line for path [...], ignoring" (harmless, exit 0)
# and our symlink is created. Renaming this file would silently flip which
# one wins.
L /var/lib/dpkg - - - - ../../usr/lib/sysimage/dpkg
