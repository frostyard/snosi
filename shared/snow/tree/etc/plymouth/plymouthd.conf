# snosi: select the Snow plymouth theme
# (shared/snow/tree/usr/share/plymouth/themes/snow/). Shipped via
# ExtraTrees, which overwrites the package conffile AFTER dpkg finishes --
# never ship this file via SkeletonTrees: a pre-existing conffile makes
# dpkg prompt at plymouth's install and the build dies at EOF on
# non-interactive stdin.
[Daemon]
Theme=snow
ShowDelay=0
DeviceTimeout=8
